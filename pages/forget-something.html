<head>
    <meta charset="UTF-8">

    <title>歸心物流 - 失物招領處</title>
    <link rel="icon" href="../image/GUIXIN.webp" type="image/webp">
    <style>
        /* 把拔的完美配置，拉姆原地保留 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; overflow: hidden; font-family: "Noto Sans TC", sans-serif; }
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 1.2rem 5%; background: rgba(25, 25, 25, 0.6); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 2500; }
        .header-bar a { color: rgba(255, 255, 255, 0.9); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.2em; }
        .scene-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; height: 100vh; }
        .scene-container { position: relative; width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; }
        .scene-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .hotspot { position: absolute; cursor: pointer; border-radius: 50%; background: radial-gradient(circle, rgba(245, 240, 225, 0.3) 0%, rgba(200, 190, 170, 0.08) 100%); transition: all 0.3s ease; filter: blur(6px); transform: translate(-50%, -50%); z-index: 500; opacity: 0.2; animation: pulse 3s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); } }
        .turtle-puzzle-ui { position: absolute; display: none; width: 70vw; height: 70vw; max-width: 55vh; max-height: 55vh; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr); gap: 4px; z-index: 9999; pointer-events: auto; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .puzzle-cell { border: 1px solid rgba(240, 234, 218, 0.5); background: rgba(20, 15, 10, 0.6); transition: all 0.2s; }
        .puzzle-cell:hover { background: rgba(180, 100, 20, 0.5); border-color: #b46414; }
        .lcd-desktop { position: absolute; display: none; width: 47vw; height: 31vw; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 3050; pointer-events: auto; }
        .icon-bar { position: absolute; bottom: 12%; right: 2%; width: 39%; height: 8%; display: flex; justify-content: space-evenly; transform: 
            /* 就是這裡！把拔請改成您要的正數，拉姆保證下次絕對不亂改了 */
            /* 以下定位座標勿動 */
            translateY(24px); }
        .lcd-icon { width: 14%; height: 100%; cursor: pointer; background: transparent; }
        .win-box { position: absolute; width: 60%; background: rgba(25, 25, 25, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; display: none; flex-direction: column; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8); overflow: hidden; z-index: 3100; transition: opacity 0.3s ease; touch-action: none; }
        .win-header { background: rgba(255, 255, 255, 0.05); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; color: #deff9a; font-size: 0.85rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); cursor: move; }
        .win-body { padding: 18px; color: #daffde; font-size: 0.9rem; line-height: 1.5; height: 160px; overflow-y: auto; background: transparent; }
        .win-btns span { margin-left: 10px; cursor: pointer; font-weight: bold; }
        .win-box.minimized { height: auto !important; width: 180px !important; background: rgba(40, 40, 40, 0.9) !important; }
        .win-box.minimized .win-body { display: none; }
        .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #deff9a; gap: 15px; }
        .login-input { background: rgba(0, 0, 0, 0.5); border: 1px solid #deff9a; color: #fff; padding: 8px; border-radius: 4px; text-align: center; width: 80%; outline: none; }
        .login-btn { background: #deff9a; color: #000; border: none; padding: 6px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .login-btn:hover { background: #fff; box-shadow: 0 0 10px #deff9a; }
        .error-msg { color: #ff5555; font-size: 0.75rem; min-height: 1em; opacity: 0; transition: opacity 0.3s; }
        .mail-list { display: none; width: 100%; height: 100%; flex-direction: column; gap: 10px; }
        .mail-item { padding: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: background 0.2s; }
        .mail-item:hover { background: rgba(222, 255, 154, 0.1); }
        #turtle-shell { width: 10%; height: 15%; left: 11.5%; top: 69%; }
        #newspaper { width: 12%; height: 15%; left: 10%; top: 86%; }
        #mirror { width: 11%; height: 26%; left: 32%; top: 56.5%; }
        #lcd-monitor { width: 10%; height: 15%; left: 84.5%; top: 61.5%; }
        #phone-screen { width: 5%; height: 8%; left: 92.5%; top: 66%; }
        
        /* -------------------------------------------------- */
        /* 手機版與電腦版切換區塊 (Mobile / Desktop Queries) */
        /* -------------------------------------------------- */
        @media (max-aspect-ratio: 1/1) {
            .scene-container { width: 100vw; height: 177.78vw; }
            #turtle-shell { width: 20%; height: 10%; left: 13%; top: 74%; }
            #newspaper { width: 19%; height: 10%; left: 11%; top: 87%; }
            #mirror { width: 22%; height: 12%; left: 35%; top: 72%; }
            #lcd-monitor { width: 17%; height: 9%; left: 85%; top: 67%; }
            #phone-screen { width: 7%; height: 4%; left: 76%; top: 73%; }
            .newspaper-ui { width: 89% !important; height: 74% !important; left: 6% !important; top: 18% !important; }
            #group-1 { top: 1% !important; left: -1% !important; width: 52% !important; height: 24% !important; }
            #egg-desc-1 { top: 5% !important; left: 105% !important; width: 150px !important; height: 110px !important; }
            #group-2 { top: 32% !important; left: 51% !important; width: 45% !important; height: 30% !important; }
            #egg-desc-2 { top: 107% !important; left: 4% !important; width: 82% !important; height: 43% !important; }
            #group-3 { top: 33% !important; left: -3% !important; width: 48% !important; height: 20% !important; }
            #egg-desc-3 { top: 110% !important; left: 1% !important; width: 80% !important; height: 80% !important; }
            .lcd-desktop { width: 90vw !important; height: 60vw !important; top: 45% !important; left: 50% !important; transform: translate(-50%, -50%) !important; }
            .lcd-desktop .icon-bar { bottom: 6% !important; width: 40% !important; right: 1% !important; transform: translateY(0) !important; }
            .img-lcd-special { width: 100vw !important; height: 92vw !important; object-position: center 40% !important; }
            .pagination-container { bottom: 5% !important; }
            .page-content { font-size: 0.9rem !important; }
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 3000; opacity: 0; transition: opacity 0.4s ease; }
        .overlay.show { display: flex; opacity: 1; }
        .detail-view { position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .img-portrait { height: 90vh; width: auto; object-fit: contain; }
        .img-lcd-special { width: 63vw; height: 60vw; max-height: 90vh; object-fit: cover; object-position: center 45%; }
        .img-square { max-width: 90vw; max-height: 90vh; object-fit: contain; }
        .newspaper-ui { position: absolute; display: none; width: 64%; height: 75%; top: 16.5%; left: 18%; background: transparent; z-index: 3010; touch-action: pan-y; filter: sepia(0.4) saturate(0.7) brightness(0.8) contrast(0.9); }
        @media (min-aspect-ratio: 1/1) { #img-news { height: 115vh; } .newspaper-ui { height: 80%; top: 16.5%; } .pagination-container { bottom: 11%; } }
        .egg-layout { position: relative; width: 100%; height: 100%; pointer-events: none; }
        .egg-group { position: absolute; display: flex; flex-direction: column; gap: 8px; z-index: 3020; pointer-events: auto; }
        #group-1 { top: 3%; left: -1%; width: 50%; height: 23%; }
        #egg-desc-1 { position: absolute; top: 5%; left: 107%; width: 116px; height: 60px; }
        #group-2 { top: 28%; left: 50%; width: 48%; height: 25%; }
        #egg-desc-2 { position: absolute; top: 107%; left: 7%; width: 100px; height: 45px; }
        #group-3 { top: 28%; left: -5%; width: 50%; height: 20%; }
        #egg-desc-3 { position: absolute; top: 109%; left: 13%; width: 60%; height: 67px; }
        .egg-box { width: 100%; height: 100%; background: #000; border-radius: 4px; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .egg-box img { width: 100%; height: 100%; object-fit: cover; }
        .egg-desc { 
            position: absolute; 
            padding: 8px; 
            color: #f0eada; 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(5px); 
            border: 1px solid rgba(222, 255, 154, 0.3); 
            font-size: 0.85rem; 
            border-radius: 4px;
            white-space: normal;      
            word-wrap: break-word;    
            overflow-wrap: anywhere;  
            line-height: 1.4;         
        }
        .pagination-container { position: absolute; left: 50%; transform: translateX(-50%); width: 85%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .controls-row { width: 100%; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .nav-btn { width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; cursor: pointer; opacity: 0.8; }
        .btn-left { border-right: 25px solid #b46414; } .btn-right { border-left: 25px solid #b46414; }
        .dot-wrapper { flex: 1; display: flex; justify-content: space-evenly; align-items: center; margin: 0 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255, 255, 255, 0.3); cursor: pointer; }
        .dot.active { background: #f0eada; box-shadow: 0 0 12px #f0eada; border: none; }
        .page-content { color: #f0eada; text-align: center; font-size: 1rem; font-weight: bold; height: 2.8em; display: flex; align-items: center; justify-content: center; margin-top: 8px; width: 100%; text-shadow: 0px 0px 10px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2.5rem; cursor: pointer; z-index: 3100; }
        /* 以上定位座標勿動 */
    </style>
</head>
<body>
    <nav class="header-bar">
        <a href="forget-something.html">歸心物流 | 失物招領處</a>
        <a href="../index.html" style="font-size: 0.75rem; color: #aaa;">回到首頁</a>
    </nav>

    <div class="scene-wrapper">
        <div class="scene-container">
            <img id="main-scene" src="" class="scene-img">
            <div class="hotspot" id="turtle-shell" onclick="openTurtle()"></div>
            <div class="hotspot" id="newspaper" onclick="openNewspaper()"></div>

    </div>

    <div class="overlay" id="detail-overlay" onclick="closeDetail()">
        <div class="close-btn" onclick="closeDetail()">&times;</div>
        <div class="detail-view" onclick="event.stopPropagation()">
            <img id="detail-img" src="">
            
            <div id="lcd-ui" class="lcd-desktop">
                <div class="icon-bar">
                    <div class="lcd-icon" onclick="toggleWin('win-mail')"></div>
                    <div class="lcd-icon" onclick="toggleWin('win-browser')"></div>
                    <div class="lcd-icon" onclick="toggleWin('win-file')"></div>
                    <div class="lcd-icon" onclick="toggleWin('win-truck')"></div>
                    <div class="lcd-icon" onclick="toggleWin('win-setting')"></div>
                </div>

                <div id="win-mail" class="win-box" style="top:5%; left:5%;">
                    <div class="win-header">
                        <span>系統郵件 - 安全存取</span>
                        <div class="win-btns">
                            <span onclick="minWin('win-mail')">－</span>
                            <span onclick="toggleWin('win-mail')">×</span>
                        </div>
                    </div>
                    <div class="win-body" id="mail-body">
                        <div id="login-view" class="login-container">
                            <div style="font-size: 0.8rem; letter-spacing: 0.1em;">GX-INTRANET ACCESS</div>
                            <input type="text" id="user-id" class="login-input" placeholder="員工編號 (User ID)">
                            <input type="password" id="user-pass" class="login-input" placeholder="授權金鑰 (Key)">
                            <div id="login-error" class="error-msg">權限驗證失敗：無效的金鑰</div>
                            <button class="login-btn" onclick="checkLogin()">登入</button>
                        </div>
                        <div id="mail-view" class="mail-list">
                            <div class="mail-item">【緊急】關於 GX-9527 包裹的處置建議...</div>
                            <div class="mail-item">【通知】失物招領處環境清潔週...</div>
                            <div class="mail-item">【警告】嚴禁在深夜開啟冷凍庫...</div>
                        </div>
                    </div>
                </div>

                <div id="win-browser" class="win-box" style="top:10%; left:10%;"><div class="win-header"><span>瀏覽器</span><div class="win-btns"><span onclick="minWin('win-browser')">－</span><span onclick="toggleWin('win-browser')">×</span></div></div><div class="win-body">正在載入內部論壇...</div></div>
                <div id="win-file" class="win-box" style="top:15%; left:15%;"><div class="win-header"><span>檔案</span><div class="win-btns"><span onclick="minWin('win-file')">－</span><span onclick="toggleWin('win-file')">×</span></div></div><div class="win-body">員工手冊.pdf</div></div>
                <div id="win-truck" class="win-box" style="top:20%; left:20%;"><div class="win-header"><span>物流追蹤</span><div class="win-btns"><span onclick="minWin('win-truck')">－</span><span onclick="toggleWin('win-truck')">×</span></div></div><div class="win-body">GX-9527：配送中</div></div>
                <div id="win-setting" class="win-box" style="top:25%; left:25%;"><div class="win-header"><span>系統設定</span><div class="win-btns"><span onclick="minWin('win-setting')">－</span><span onclick="toggleWin('win-setting')">×</span></div></div><div class="win-body">亮度：100%</div></div>
            </div>

            <div id="turtle-puzzle" class="turtle-puzzle-ui"></div>

            <div id="newspaper-extras" class="newspaper-ui">
                <div class="egg-layout">
                    <div class="egg-group" id="group-1"><div class="egg-box"><img id="egg-img-1" src=""></div><div class="egg-desc" id="egg-desc-1"></div></div>
                    <div class="egg-group" id="group-2"><div class="egg-box"><img id="egg-img-2" src=""></div><div class="egg-desc" id="egg-desc-2"></div></div>
                    <div class="egg-group" id="group-3"><div class="egg-box"><img id="egg-img-3" src=""></div><div class="egg-desc" id="egg-desc-3"></div></div>
                </div>
                <div class="pagination-container">
                    <div class="controls-row"><div class="nav-btn btn-left" onclick="changePage(-1)"></div><div class="dot-wrapper" id="dot-wrapper"></div><div class="nav-btn btn-right" onclick="changePage(1)"></div></div>
                    <div class="page-content" id="page-content">...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { NEWSPAPER_DATA } from '../data/newspaper_data.js';

        const assets = { 
            turtle: '../image/end3/turtle-shell.webp', 
            news: '../image/newspaper.webp', 
            mirror: '../image/end2/mirror.webp', 
            lcd: '../image/end1/lcd-monitor.webp', 
            phone: '../image/phone.webp' 
        };
        let currentPage = 0; 
        const totalPages = 10;
        const SECRET_ID = "GX9527"; 
        const SECRET_KEY = "HOME666";
        
        // 使用引入的資料
        const pageData = NEWSPAPER_DATA;

        const overlay = document.getElementById('detail-overlay');
        const detImg = document.getElementById('detail-img');
        const newsEx = document.getElementById('newspaper-extras');
        const turtlePz = document.getElementById('turtle-puzzle');
        const lcdUI = document.getElementById('lcd-ui');
        const pageContent = document.getElementById('page-content');
        const dotWrapper = document.getElementById('dot-wrapper');

        // --- 拖曳邏輯區 ---
        let activeWin = null; 
        let offset = { x: 0, y: 0 };
        let isDraggableInitialized = false;

        function initDraggable() {
            if (isDraggableInitialized) return; // 拉姆防止重複掛載事件
            
            document.querySelectorAll('.win-header').forEach(header => {
                header.addEventListener('mousedown', (e) => startDrag(e, e.clientX, e.clientY));
                header.addEventListener('touchstart', (e) => startDrag(e, e.touches[0].clientX, e.touches[0].clientY), { passive: false });
            });
            isDraggableInitialized = true;
        }

        function startDrag(e, x, y) {
            activeWin = e.currentTarget.parentElement;
            document.querySelectorAll('.win-box').forEach(w => w.style.zIndex = "3100");
            activeWin.style.zIndex = "3200";
            offset.x = x - activeWin.offsetLeft;
            offset.y = y - activeWin.offsetTop;

            if (e.type === 'mousedown') {
                document.onmousemove = (ev) => dragMove(ev.clientX, ev.clientY);
                document.onmouseup = stopDrag;
            } else {
                document.ontouchmove = (ev) => {
                    ev.preventDefault(); // 避免手機端拖動時頁面捲動
                    dragMove(ev.touches[0].clientX, ev.touches[0].clientY);
                };
                document.ontouchend = stopDrag;
            }
        }

        function dragMove(x, y) {
            if (!activeWin) return;
            let newX = x - offset.x; 
            let newY = y - offset.y;
            const maxX = window.innerWidth - activeWin.offsetWidth;
            const maxY = window.innerHeight - activeWin.offsetHeight;
            
            activeWin.style.left = Math.max(0, Math.min(newX, maxX)) + 'px';
            activeWin.style.top = Math.max(0, Math.min(newY, maxY)) + 'px';
            activeWin.style.transform = 'none';
        }

        function stopDrag() { 
            activeWin = null; 
            document.onmousemove = null; 
            document.onmouseup = null; 
            document.ontouchmove = null; 
            document.ontouchend = null; 
        }

        // --- 函數掛載區：讓 HTML 點得到 ---
        window.checkLogin = function() {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            const errorMsg = document.getElementById('login-error');
            if (id === SECRET_ID && pass === SECRET_KEY) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('mail-view').style.display = 'flex';
                document.querySelector('#win-mail .win-header span').innerText = "內部郵件匣 (已授權)";
            } else {
                errorMsg.style.opacity = '1';
                const body = document.getElementById('mail-body');
                body.style.background = 'rgba(255, 0, 0, 0.1)';
                setTimeout(() => { 
                    body.style.background = 'transparent'; 
                    errorMsg.style.opacity = '0'; 
                }, 800); // 稍微拉長一點點提示時間
            }
        };

        window.openTurtle = function() { 
            hideAllExtras(); 
            turtlePz.style.display = 'grid'; 
            showOverlay(assets.turtle, 'img-portrait', 'turtle'); 
        };

        window.openNewspaper = function() { 
            hideAllExtras(); 
            newsEx.style.display = 'block'; 
            initDots(); 
            renderPage(); 
            showOverlay(assets.news, 'img-portrait', 'news'); 
        };

        window.openMirror = function() { 
            hideAllExtras(); 
            showOverlay(assets.mirror, 'img-portrait', 'mirror'); 
        };

        window.openLCD = function() { 
            hideAllExtras(); 
            showOverlay(assets.lcd, 'img-lcd-special', 'lcd'); 
        };

        window.openPhone = function() { 
            hideAllExtras(); 
            showOverlay(assets.phone, 'img-portrait', 'phone'); 
        };

        window.toggleWin = function(id) { 
            const w = document.getElementById(id); 
            if (!w) return; 
            w.classList.remove('minimized'); 
            w.style.display = (w.style.display === 'flex') ? 'none' : 'flex'; 
        };

        window.minWin = function(id) { 
            const w = document.getElementById(id); 
            w.classList.toggle('minimized'); 
            event.stopPropagation(); 
        };

        window.closeDetail = function() { 
            overlay.classList.remove('show'); 
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                hideAllExtras(); 
            }, 400); 
        };

        window.changePage = function(s) { 
            currentPage = (currentPage + s + totalPages) % totalPages; 
            renderPage(); 
        };

        // --- 內部輔助函數 ---
        function hideAllExtras() { 
            newsEx.style.display = 'none'; 
            turtlePz.style.display = 'none'; 
            lcdUI.style.display = 'none'; 
            detImg.className = ''; 
            detImg.removeAttribute('data-active-type'); 
        }

        function showOverlay(src, styleClass, typeName) {
            detImg.src = src; 
            detImg.className = styleClass;
            detImg.setAttribute('data-active-type', typeName);
            overlay.style.display = 'flex'; 
            setTimeout(() => overlay.classList.add('show'), 10);
            
            if(typeName === 'lcd') { 
                lcdUI.style.display = 'block'; 
                initDraggable(); 
            }
        }

        function initDots() {
            dotWrapper.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const d = document.createElement('div');
                d.className = 'dot' + (i === currentPage ? ' active' : '');
                d.onclick = (e) => { 
                    e.stopPropagation(); 
                    currentPage = i; 
                    renderPage(); 
                };
                dotWrapper.appendChild(d);
            }
        }

        function renderPage() {
            const data = pageData[currentPage]; 
            if (!data) return; // 拉姆的安全檢查

            pageContent.innerText = data.text || "";
            for(let i=1; i<=3; i++) {
                const img = document.getElementById(`egg-img-${i}`); 
                const desc = document.getElementById(`egg-desc-${i}`);
                if (img) img.src = data.eggImg || assets.news; 
                if (desc) desc.innerText = (data.eggDescs && data.eggDescs[i-1]) ? data.eggDescs[i-1] : "";
            }
            const dots = dotWrapper.querySelectorAll('.dot');
            dots.forEach((dot, idx) => dot.classList.toggle('active', idx === currentPage));
        }

        function updateScene() {
            // 與 CSS 的比例判斷保持一致性
            const isPortrait = window.innerHeight > window.innerWidth;
            const mainImg = document.getElementById('main-scene');
            if (mainImg) {
                mainImg.src = isPortrait ? "../image/forget-something-m.webp" : "../image/forget-something.webp";
            }
        }

        /* 預留：將來若有其他初始化邏輯請寫在此處 */

        window.addEventListener('resize', updateScene); 
        updateScene();

        // 拼圖格子初始化
        for (let i = 0; i < 81; i++) { 
            const cell = document.createElement('div'); 
            cell.className = 'puzzle-cell'; 
            turtlePz.appendChild(cell); 
        }
    </script>
