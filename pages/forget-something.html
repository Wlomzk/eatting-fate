<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歸心物流 - 忘了什麼嗎？</title>
    <style>
        /* ... 前面 body/header/scene/hotspot 維持妳原本的 ... */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; display: flex; flex-direction: column; overflow: hidden; font-family: "Noto Sans TC", sans-serif; }
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 1.2rem 5%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 2000; }
        .header-bar a { color: rgba(255, 255, 255, 0.9); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.2em; }
        .scene-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; height: 100vh; }
        .scene-container { position: relative; width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; }
        .scene-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .hotspot { position: absolute; cursor: pointer; border-radius: 50%; background: radial-gradient(circle at center, rgba(0, 255, 120, 0.5) 0%, transparent 70%); transition: all 0.3s ease; filter: blur(8px); transform: translate(-50%, -50%); z-index: 500; opacity: 0.2; animation: pulse 3s infinite ease-in-out; }
        #turtle-shell { width: 10%; height: 15%; left: 11.5%; top: 69%; }
        #newspaper    { width: 12%; height: 15%; left: 10%; top: 86%; }
        #crt-monitor  { width: 8%; height: 10%; left: 24%; top: 77.5%; }
        #lcd-monitor  { width: 10%; height: 15%; left: 84.5%; top: 61.5%; }
        #phone-screen { width: 5%; height: 8%; left: 92.5%; top: 66%; }
        @keyframes pulse { 0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.15); } }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 3000; opacity: 0; transition: opacity 0.4s ease; }
        .overlay.show { display: flex; opacity: 1; }
        .detail-view { position: relative; display: flex; justify-content: center; align-items: center; }
        .img-portrait { height: 90vh; width: auto; object-fit: contain; }

        /* --- 📰 報紙 UI：還原座標 + 邊緣霧化 --- */
        .newspaper-ui {
            position: absolute;
            display: none;
            /* 💡 還原妳最辛苦調整的比例與位置 */
            width: 64%; height: 70%; 
            top: 18%; left: 18%; 
            
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            /* 💡 霧化重點：拿掉 border，改用 box-shadow 做外擴散 */
            border: none; 
            box-shadow: 0 0 40px 15px rgba(255, 255, 255, 0.07); 
            
            z-index: 3010;
        }

        /* 💡 讓控制列回到最下方 */
        .pagination-container {
            position: absolute;
            bottom: 5%; /* 回到底部 */
            left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 15px;
            pointer-events: none;
        }

        .nav-btn {
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            cursor: pointer;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            pointer-events: auto;
        }
        /* 💡 還原內縮位置 */
        .btn-left { border-right: 25px solid rgba(148, 76, 13, 0.9); margin-right: 5px; }
        .btn-right { border-left: 25px solid rgba(148, 76, 13, 0.9); margin-left: 5px; }

        .dot-wrapper { display: flex; gap: 8px; align-items: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); cursor: pointer; pointer-events: auto; }
        .dot.active { background: rgba(0, 0, 0, 0.8); box-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }

        /* 💡 文字改到圈圈下面，且緊貼控制列 */
        .page-content {
            position: absolute;
            bottom: -35px; /* 在控制列（圈圈）的下方 */
            left: 0; width: 100%;
            color: white; text-align: center; font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2.5rem; cursor: pointer; z-index: 3100; }
    </style>
</head>
<body>
    <nav class="header-bar">
        <a href="forget-something.html">歸心物流 | 失物招領處</a>
        <a href="../index.html" style="font-size: 0.75rem; color: #aaa;">回到首頁</a>
    </nav>

    <div class="scene-wrapper">
        <div class="scene-container">
            <img id="main-scene" src="" class="scene-img">
            <div class="hotspot" id="turtle-shell" onclick="handleDetailPopup('turtle')"></div>
            <div class="hotspot" id="newspaper" onclick="handleDetailPopup('newspaper')"></div>
            <div class="hotspot" id="crt-monitor" onclick="handleDetailPopup('mirror')"></div> 
            <div class="hotspot" id="lcd-monitor" onclick="handleDetailPopup('lcd')"></div>
            <div class="hotspot" id="phone-screen" onclick="handleDetailPopup('phone')"></div>
        </div>
    </div>

    <div class="overlay" id="detail-overlay" onclick="closeDetail()">
        <div class="close-btn" onclick="closeDetail()">&times;</div>
        <div class="detail-view" onclick="event.stopPropagation()">
            <img id="detail-img" src="">
            <div id="newspaper-extras" class="newspaper-ui">
                <div class="pagination-container">
                    <div class="nav-btn btn-left" onclick="changePage(-1)"></div>
                    <div class="dot-wrapper" id="dot-wrapper"></div>
                    <div class="nav-btn btn-right" onclick="changePage(1)"></div>
                    <div class="page-content" id="page-content">載入中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ... JS 邏輯不變，確保功能正確 ... */
        const detailAssets = { 'turtle': { src: '../image/end3/turtle-shell.webp', type: 'portrait' }, 'newspaper': { src: '../image/newspaper.webp', type: 'portrait' }, 'mirror': { src: '../image/end2/mirror.webp', type: 'portrait' }, 'lcd': { src: '../image/end1/lcd-monitor.webp', type: 'square' }, 'phone': { src: '../image/phone.webp', type: 'portrait' } };
        let currentPage = 0; const totalPages = 10;
        const pageTexts = ["第一頁內容", "第二頁內容", "第三頁內容", "第四頁內容", "第五頁內容", "第六頁內容", "第七頁內容", "第八頁內容", "第九頁內容", "第十頁內容"];
        function updateImageSource() { const img = document.getElementById('main-scene'); if (!img) return; img.src = (window.innerHeight > window.innerWidth) ? "../image/forget-something-m.webp" : "../image/forget-something.webp"; }
        function initDots() { const wrapper = document.getElementById('dot-wrapper'); wrapper.innerHTML = ''; for (let i = 0; i < totalPages; i++) { const dot = document.createElement('div'); dot.className = 'dot' + (i === currentPage ? ' active' : ''); dot.onclick = () => { currentPage = i; renderPage(); }; wrapper.appendChild(dot); } }
        function changePage(step) { currentPage = (currentPage + step + totalPages) % totalPages; renderPage(); }
        function renderPage() { document.getElementById('page-content').innerText = pageTexts[currentPage]; document.querySelectorAll('.dot').forEach((dot, index) => dot.classList.toggle('active', index === currentPage)); }
        function handleDetailPopup(key) {
            const asset = detailAssets[key]; const overlay = document.getElementById('detail-overlay'); const detailImg = document.getElementById('detail-img'); const newsExtras = document.getElementById('newspaper-extras');
            detailImg.src = asset.src; detailImg.className = (asset.type === 'portrait') ? 'img-portrait' : 'img-square';
            if (key === 'newspaper') { newsExtras.style.display = 'block'; currentPage = 0; initDots(); renderPage(); } else { newsExtras.style.display = 'none'; }
            overlay.style.display = 'flex'; setTimeout(() => overlay.classList.add('show'), 10);
        }
        function closeDetail() { const overlay = document.getElementById('detail-overlay'); overlay.classList.remove('show'); setTimeout(() => overlay.style.display = 'none', 400); }
        updateImageSource(); window.addEventListener('resize', updateImageSource);
    </script>
</body>
</html>
