<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歸心物流 - 忘了什麼嗎？</title>
    <link rel="icon" href="../image/GUIXIN.webp" type="image/webp">
    <style>
        /* --- 基礎佈局 (維持原樣) --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            overflow: hidden;
            font-family: "Noto Sans TC", sans-serif;
        }

        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 1.2rem 5%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 2000;
        }

        .header-bar a { color: rgba(255, 255, 255, 0.9); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.2em; }

        .scene-wrapper {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; width: 100%; height: 100vh;
        }

        .scene-container {
            position: relative;
            width: 100vw; height: 56.25vw; 
            max-height: 100vh; max-width: 177.78vh;
        }

        .scene-img { width: 100%; height: 100%; object-fit: contain; display: block; }

        .hotspot {
            position: absolute; cursor: pointer; border-radius: 50%;
            background: radial-gradient(circle at center, rgba(0, 255, 120, 0.5) 0%, transparent 70%);
            transition: all 0.3s ease; filter: blur(8px); transform: translate(-50%, -50%);
            z-index: 500; opacity: 0.2; animation: pulse 3s infinite ease-in-out;
        }

        #turtle-shell { width: 10%; height: 15%; left: 11.5%; top: 69%; }
        #newspaper    { width: 12%; height: 15%; left: 10%; top: 86%; }
        #crt-monitor  { width: 8%; height: 10%; left: 24%; top: 77.5%; }
        #lcd-monitor  { width: 10%; height: 15%; left: 84.5%; top: 61.5%; }
        #phone-screen { width: 5%; height: 8%; left: 92.5%; top: 66%; }

        @media (max-aspect-ratio: 1/1) {
            .scene-container { width: 100vw; height: 177.78vw; }
            #turtle-shell { width: 20%; height: 10%; left: 13%; top: 74%; }
            #newspaper    { width: 19%; height: 10%; left: 11%; top: 87%; }
            #crt-monitor  { width: 17%; height: 9%; left: 35%; top: 82%; }
            #lcd-monitor  { width: 17%; height: 9%; left: 85%; top: 67%; }
            #phone-screen { width: 7%; height: 4%; left: 76%; top: 73%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.15); }
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 3000; opacity: 0; transition: opacity 0.4s ease;
        }
        .overlay.show { display: flex; opacity: 1; }

        .detail-view { position: relative; display: flex; justify-content: center; align-items: center; }
        .img-portrait { height: 90vh; width: auto; object-fit: contain; }
        .img-square { width: 90vw; height: auto; max-height: 90vh; object-fit: contain; }

        /* 📰 報紙專用 UI */
        .newspaper-ui {
            position: absolute; display: none; width: 64%; height: 75%; top: 14%; left: 18%;
            border-radius: 20px; overflow: hidden;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.06) 60%, transparent 100%);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 3010; touch-action: pan-y;
        }

        /* 💡 圖文混排區域 - 修正外邊距確保置中 */
        .egg-layout {
    display: flex;
    flex-direction: column;
    gap: 22px;        /* 🚀 間距加大約 2/3，產生疏離感 */
    width: 90%;
    height: 78%;
    margin: 15px auto 0;
    color: white;
}

        .row-large { display: flex; gap: 15px; height: 38%; }
        .row-small-1 { display: flex; gap: 15px; height: 22%; align-items: center; }
        .row-small-2 { 
    display: flex; 
    gap: 15px; 
    height: 18%;      /* 🚀 稍微縮小高度 */
    align-items: center;
    width: 105%;      /* 🚀 讓寬度稍微超出容器 */
    margin-left: -5%; /* 🚀 往左邊凸出去，製造不整齊感 */
}

        .egg-box { 
    background: #000; 
    border-radius: 4px; 
    overflow: hidden;
    box-shadow: 3px 3px 10px rgba(0,0,0,0.5); /* 加一點點陰影增加層次 */
}
        .egg-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .egg-desc { 
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 8px;
            text-align: center; line-height: 1.4;
        }

        /* 💡 翻頁導航 - 修正置中問題 */
        .pagination-container {
            position: absolute; bottom: 3%; left: 50%; 
            transform: translateX(-50%); /* 確保水平絕對置中 */
            width: 90%;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
        }

        .controls-row { 
            width: 100%; display: flex; justify-content: space-between; 
            align-items: center; pointer-events: auto;
        }

        .nav-btn {
            width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent;
            cursor: pointer; opacity: 0.8; transition: 0.2s; pointer-events: auto;
        }
        .btn-left { border-right: 25px solid rgba(148, 76, 13, 0.9); }
        .btn-right { border-left: 25px solid rgba(148, 76, 13, 0.9); }

        .dot-wrapper { 
            flex: 1; display: flex; justify-content: space-evenly; 
            align-items: center; margin: 0 15px; 
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); cursor: pointer; }
        .dot.active { background: #fff; box-shadow: 0 0 8px #fff; }

        .page-content {
            color: white; text-align: center; font-size: 0.85rem; height: 2.8em; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; margin-top: 8px; pointer-events: none;
            width: 100%;
        }

        .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2.5rem; cursor: pointer; z-index: 3100; }
    </style>
</head>
<body>

    <nav class="header-bar">
        <a href="forget-something.html">歸心物流 | 失物招領處</a>
        <a href="../index.html" style="font-size: 0.75rem; color: #aaa;">回到首頁</a>
    </nav>

    <div class="scene-wrapper">
        <div class="scene-container">
            <img id="main-scene" src="" class="scene-img" alt="Warehouse">
            <div class="hotspot" id="turtle-shell" onclick="handleDetailPopup('turtle')"></div>
            <div class="hotspot" id="newspaper" onclick="handleDetailPopup('newspaper')"></div>
            <div class="hotspot" id="crt-monitor" onclick="handleDetailPopup('mirror')"></div> 
            <div class="hotspot" id="lcd-monitor" onclick="handleDetailPopup('lcd')"></div>
            <div class="hotspot" id="phone-screen" onclick="handleDetailPopup('phone')"></div>
        </div>
    </div>

    <div class="overlay" id="detail-overlay" onclick="closeDetail()">
        <div class="close-btn" onclick="closeDetail()">&times;</div>
        
        <div class="detail-view" onclick="event.stopPropagation()">
            <img id="detail-img" src="" alt="Detail View">

            <div id="newspaper-extras" class="newspaper-ui">
                <div class="egg-layout">
    <div class="row-large">
        <div class="egg-box" style="flex: 2;"><img id="egg-img-1" src=""></div>
        <div class="egg-desc" id="egg-desc-1">大方塊說明</div>
    </div>
    
    <div class="row-small-1">
        <div class="egg-desc" id="egg-desc-2">小方塊一說明</div>
        <div class="egg-box" style="flex: 1; height: 100%;"><img id="egg-img-2" src=""></div>
    </div>
    
    <div class="row-small-2">
        <div class="egg-box" style="flex: 0.8; height: 100%;"><img id="egg-img-3" src=""></div>
        <div class="egg-desc" id="egg-desc-3" style="text-align: left;">小方塊二說明</div>
    </div>
</div>

                <div class="pagination-container">
                    <div class="controls-row">
                        <div class="nav-btn btn-left" onclick="changePage(-1)"></div>
                        <div class="dot-wrapper" id="dot-wrapper"></div>
                        <div class="nav-btn btn-right" onclick="changePage(1)"></div>
                    </div>
                    <div class="page-content" id="page-content">自自自自自自自自</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const detailAssets = {
            'turtle':    { src: '../image/end3/turtle-shell.webp', type: 'portrait' },
            'newspaper': { src: '../image/newspaper.webp',      type: 'portrait' },
            'mirror':    { src: '../image/end2/mirror.webp',       type: 'portrait' },
            'lcd':       { src: '../image/end1/lcd-monitor.webp',  type: 'square'   },
            'phone':     { src: '../image/phone.webp',             type: 'portrait' }
        };

        let currentPage = 0;
        const totalPages = 10;
        
        // 💡 恢復把拔的「自自自」風格，並加入三個方塊的描述資料
        const pageData = [
            { text: "第一頁：自自自自自自自自", eggImgs: ["","",""], eggDescs: ["大塊的描述在此","細節 A","細節 B"] },
            { text: "第二頁：自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["這頁的主線索","細節 C","細節 D"] },
            { text: "第三頁：自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["這裡放文字...","...","..."] },
            { text: "第四頁：自自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["...","...","..."] },
            { text: "第五頁：自自自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["...","...","..."] },
            { text: "第六頁：自自自自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["...","...","..."] },
            { text: "第七頁：自自自自自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["...","...","..."] },
            { text: "第八頁：自自自自自自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["...","...","..."] },
            { text: "第九頁：自自自自自自自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["...","...","..."] },
            { text: "第十頁：自自自自自自自自自自自自自自自自自", eggImgs: ["","",""], eggDescs: ["...","...","..."] }
        ];

        function updateImageSource() {
            const img = document.getElementById('main-scene');
            if (!img) return;
            img.src = (window.innerHeight > window.innerWidth) ? "../image/forget-something-m.webp" : "../image/forget-something.webp";
        }

        function initDots() {
            const wrapper = document.getElementById('dot-wrapper');
            wrapper.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === currentPage ? ' active' : '');
                dot.onclick = () => { currentPage = i; renderPage(); };
                wrapper.appendChild(dot);
            }
        }

        function changePage(step) {
            currentPage = (currentPage + step + totalPages) % totalPages;
            renderPage();
        }

        function renderPage() {
            const data = pageData[currentPage];
            document.getElementById('page-content').innerText = data.text;
            
            for(let i=1; i<=3; i++) {
                const imgEl = document.getElementById(`egg-img-${i}`);
                const descEl = document.getElementById(`egg-desc-${i}`);
                // 確保圖片在沒網址時顯示黑色
                imgEl.src = data.eggImgs[i-1] || "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
                descEl.innerText = data.eggDescs[i-1];
            }

            document.querySelectorAll('.dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentPage);
            });
        }

        function handleDetailPopup(key) {
            const asset = detailAssets[key];
            const overlay = document.getElementById('detail-overlay');
            const detailImg = document.getElementById('detail-img');
            const newsExtras = document.getElementById('newspaper-extras');

            detailImg.src = asset.src;
            detailImg.className = (asset.type === 'portrait') ? 'img-portrait' : 'img-square';
            
            if (key === 'newspaper') {
                newsExtras.style.display = 'block';
                initDots();
                renderPage();
            } else {
                newsExtras.style.display = 'none';
            }
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
        }

        function closeDetail() {
            const overlay = document.getElementById('detail-overlay');
            overlay.classList.remove('show');
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }

        // 滑動翻頁
        let touchStartX = 0;
        let touchEndX = 0;
        const newspaperUI = document.getElementById('newspaper-extras');

        newspaperUI.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
        newspaperUI.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) changePage(1);
            if (touchEndX > touchStartX + 50) changePage(-1);
        }, false);

        updateImageSource();
        window.addEventListener('resize', updateImageSource);
    </script>
</body>
</html>
