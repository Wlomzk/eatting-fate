<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歸心物流 - 忘了什麼嗎？</title>
    <link rel="icon" href="../image/GUIXIN.webp" type="image/webp">
    <style>
        /* --- 基礎佈局 --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            overflow: hidden;
            font-family: "Noto Sans TC", sans-serif;
        }

        /* 導航欄 */
        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 1.2rem 5%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 2000;
        }

        .header-bar a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 0.9rem; letter-spacing: 0.2em;
        }

        /* 場景容器 */
        .scene-wrapper {
            flex: 1;
            display: flex; justify-content: center; align-items: center;
            position: relative; width: 100%; height: 100vh;
        }

        .scene-container {
            position: relative;
            width: 100vw; height: 56.25vw; 
            max-height: 100vh; max-width: 177.78vh;
        }

        .scene-img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 互動點 Hotspots */
        .hotspot {
            position: absolute;
            cursor: pointer;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(0, 255, 120, 0.5) 0%, transparent 70%);
            transition: all 0.3s ease;
            filter: blur(8px);
            transform: translate(-50%, -50%);
            z-index: 500;
            opacity: 0.2;
            animation: pulse 3s infinite ease-in-out;
        }

        .hotspot:hover, .hotspot.active {
            opacity: 0.9 !important;
            filter: blur(15px) brightness(1.5);
            transform: translate(-50%, -50%) scale(1.3);
        }

        /* 桌面版座標 (要把拔的心血，絕對不動) */
        #turtle-shell { width: 10%; height: 15%; left: 11.5%; top: 69%; }
        #newspaper    { width: 12%; height: 15%; left: 10%; top: 86%; }
        #crt-monitor  { width: 8%; height: 10%; left: 24%; top: 77.5%; }
        #lcd-monitor  { width: 10%; height: 15%; left: 84.5%; top: 61.5%; }
        #phone-screen { width: 5%; height: 8%; left: 92.5%; top: 66%; }

        /* 手機版 RWD 座標 */
        @media (max-aspect-ratio: 1/1) {
            .scene-container { width: 100vw; height: 177.78vw; }
            #turtle-shell { width: 20%; height: 10%; left: 13%; top: 74%; }
            #newspaper    { width: 19%; height: 10%; left: 11%; top: 87%; }
            #crt-monitor  { width: 17%; height: 9%; left: 35%; top: 82%; }
            #lcd-monitor  { width: 17%; height: 9%; left: 85%; top: 67%; }
            #phone-screen { width: 7%; height: 4%; left: 76%; top: 73%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.15); }
        }

        /* 彈出視窗 Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 3000;
            opacity: 0; transition: opacity 0.4s ease;
        }

        .overlay.is-newspaper {
    background-color: #1a120b;
    background-image: 
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,0.2) 50%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%);
    background-size: 20px 100%, 100% 4px, 100% 100%;
}

.is-newspaper .img-portrait {
    filter: drop-shadow(0 15px 40px rgba(0,0,0,0.8));
}

        .overlay.show { display: flex; opacity: 1; }

        .detail-view {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;  /* 💡 新增：寬度撐滿 */
    height: 100%; /* 💡 新增：高度撐滿 */
}

        .img-portrait {
    width: auto;
    height: 100vh; /* 💡 讓高度鎖定在螢幕 100% */
    max-width: 100vw;
    object-fit: contain; /* 💡 保持比例，絕對不拉伸 */
}

        .img-square {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 保留完整圖片 */
    max-height: 95vh;
}

        /* --- 📰 報紙專用 UI (霧化修正版) --- */
        .newspaper-ui {
            position: absolute;
            display: none;
            width: 64%; height: 70%; 
            top: 18%; left: 18%;
            border-radius: 20px; /* 💡 微微的倒角，看起來更有層次感 */
    overflow: hidden;

            background: radial-gradient(
        circle, 
        rgba(255, 255, 255, 0.08) 0%, 
        rgba(255, 255, 255, 0.06) 60%, 
        transparent 100%
    );

    /* 💡 重點 2：加強模糊，讓漸層背景跟底圖融為一體 */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    border: none; /* 絕對不能有邊框線 */
    z-index: 3010;
}

        /* 下方導航容器 */
        .pagination-container {
    position: absolute;
    bottom: 2%; /* 讓文字底部接近毛玻璃邊緣 */
    left: 0; 
    width: 100%;
    box-sizing: border-box;
    padding: 0 5%;
    display: flex; 
    flex-direction: column; /* 讓內容垂直排列：按鈕列在頂，文字在底 */
    align-items: center;
    gap: 5px; /* 💡 縮短圈圈與文字之間的間距 (原為15px) */
    pointer-events: none;
}

        /* 控制按鈕與圈圈的橫列 */
        .controls-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: auto;
}

        .nav-btn {
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            cursor: pointer;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
            transition: transform 0.2s;
            pointer-events: auto;
            border-radius: 4px;  /* 💡 雖然是三角形，但微圓角可以讓頂點看起來不那麼刺 */
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
    transition: transform 0.2s, opacity 0.2s;
    opacity: 0.8;
        }

        .nav-btn:hover {
    opacity: 1;
    transform: scale(1.1);
}
        .nav-btn:active { transform: scale(0.9); }
        .btn-left { border-right: 25px solid rgba(148, 76, 13, 0.9); margin-right: 0px; }
        .btn-right { border-left: 25px solid rgba(148, 76, 13, 0.9); margin-left: 0px; }

        .dot-wrapper { 
    flex: 1; 
    display: flex; 
    justify-content: space-between; /* 💡 改成 space-between 或 space-evenly，讓它們填滿 */
    align-items: center;  
    margin: 0 20px;     /* 💡 給圓圈跟三角形之間留一點點高級的呼吸感就好 */
    pointer-events: auto;
}
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease; cursor: pointer; pointer-events: auto;
        }
        .dot.active {
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* 💡 頁面文字：確保在圈圈與毛玻璃下緣之間置中 */
        .page-content-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center;
            width: 100%;
        }

        .page-content {
    color: white;
    text-align: center;
    
    /* 1. 字體大小設定在這裡 */
    font-size: 0.8rem;      /* 💡 稍微縮小一點（原為 1.1rem），增加精緻感 */
    line-height: 1.4;        /* 設定行高，讓多行字時不會太擠 */
    
    /* 2. 固定高度：這是防止按鈕被往上擠的關鍵 */
    height: 2.8em;           /* 💡 固定兩行字的高度，多出來的字會藏起來 */
    overflow: hidden;        /* 💡 萬一字太多，也不准撐開容器 */
    
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
    letter-spacing: 0.1em;
    pointer-events: none;
    
    /* 3. 與上方圈圈的間距 */
    margin-top: 5px; 
}

        .close-btn {
            position: absolute; top: 20px; right: 20px;
            color: #fff; font-size: 2.5rem; cursor: pointer; z-index: 3100;
        }
    </style>
</head>
<body>

    <nav class="header-bar">
        <a href="forget-something.html">歸心物流 | 失物招領處</a>
        <a href="../index.html" style="font-size: 0.75rem; color: #aaa;">回到首頁</a>
    </nav>

    <div class="scene-wrapper">
        <div class="scene-container">
            <img id="main-scene" src="" class="scene-img" alt="Warehouse">
            <div class="hotspot" id="turtle-shell" onclick="handleDetailPopup('turtle')"></div>
            <div class="hotspot" id="newspaper" onclick="handleDetailPopup('newspaper')"></div>
            <div class="hotspot" id="crt-monitor" onclick="handleDetailPopup('mirror')"></div> 
            <div class="hotspot" id="lcd-monitor" onclick="handleDetailPopup('lcd')"></div>
            <div class="hotspot" id="phone-screen" onclick="handleDetailPopup('phone')"></div>
        </div>
    </div>

    <div class="overlay" id="detail-overlay" onclick="closeDetail()">
        <div class="close-btn" onclick="closeDetail()">&times;</div>
        
        <div class="detail-view" onclick="event.stopPropagation()">
            <img id="detail-img" src="" alt="Detail View">

            <div id="newspaper-extras" class="newspaper-ui">
                <div class="pagination-container">
                    <div class="controls-row">
                        <div class="nav-btn btn-left" onclick="changePage(-1)"></div>
                        <div class="dot-wrapper" id="dot-wrapper"></div>
                        <div class="nav-btn btn-right" onclick="changePage(1)"></div>
                    </div>
                    <div class="page-content-wrapper">
                        <div class="page-content" id="page-content">載入中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const detailAssets = {
            'turtle':    { src: '../image/end3/turtle-shell.webp', type: 'portrait' },
            'newspaper': { src: '../image/newspaper.webp',      type: 'portrait' },
            'mirror':    { src: '../image/end2/mirror.webp',       type: 'portrait' },
            'lcd':       { src: '../image/end1/lcd-monitor.webp',  type: 'square'   },
            'phone':     { src: '../image/phone.webp',             type: 'portrait' }
        };

        let currentPage = 0;
        const totalPages = 10;
        const pageTexts = [
            "第一頁：自自自自自自自自",
            "第二頁：自自自自自自自自自",
            "第三頁：自自自自自自自自自自",
            "第四頁：自自自自自自自自自自自",
            "第五頁：自自自自自自自自自自自自",
            "第六頁：自自自自自自自自自自自自自",
            "第七頁：自自自自自自自自自自自自自自",
            "第八頁：自自自自自自自自自自自自自自自",
            "第九頁：自自自自自自自自自自自自自自自自",
            "第十頁：自自自自自自自自自自自自自自自自自"
        ];

        function updateImageSource() {
            const img = document.getElementById('main-scene');
            if (!img) return;
            img.src = (window.innerHeight > window.innerWidth) ? "../image/forget-something-m.webp" : "../image/forget-something.webp";
        }

        function initDots() {
            const wrapper = document.getElementById('dot-wrapper');
            wrapper.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === currentPage ? ' active' : '');
                dot.onclick = () => { currentPage = i; renderPage(); };
                wrapper.appendChild(dot);
            }
        }

        function changePage(step) {
            currentPage = (currentPage + step + totalPages) % totalPages;
            renderPage();
        }

        function renderPage() {
            const content = document.getElementById('page-content');
            if (content) content.innerText = pageTexts[currentPage];
            document.querySelectorAll('.dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentPage);
            });
        }

        function handleDetailPopup(key) {
            const asset = detailAssets[key];
            const overlay = document.getElementById('detail-overlay');
            const detailImg = document.getElementById('detail-img');
            const newsExtras = document.getElementById('newspaper-extras');

            detailImg.src = asset.src;
            detailImg.className = (asset.type === 'portrait') ? 'img-portrait' : 'img-square';
            
            if (key === 'newspaper') {
                overlay.classList.add('is-newspaper');
                newsExtras.style.display = 'block';
                
                currentPage = 0;
                initDots();
                renderPage();
            } else {
                overlay.classList.remove('is-newspaper');
                newsExtras.style.display = 'none';
            }
            
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
        }

        function closeDetail() {
            const overlay = document.getElementById('detail-overlay');
            overlay.classList.remove('show');
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }

        updateImageSource();
        window.addEventListener('resize', updateImageSource);
    </script>
</body>
</html>
