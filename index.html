<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歸心物流 Guixin Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Noto Serif TC', serif; 
            background-color: #f2ede9; 
            color: #3d3631; 
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none !important; color: inherit; }
        .hero-banner { background-color: #4a443e; color: #d9d4cc; }
        .search-container { border: 1px solid #4a443e; background: #ffffff; }
        .tracking-widest-custom { letter-spacing: 0.3em; }
        .company-logo { width: 48px; height: 48px; object-fit: contain; }
        @media (min-width: 768px) {
            .company-logo { width: 56px; height: 56px; }
        }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .status-bar {
            background: #3d3631;
            color: #8c8279;
            font-size: 10px;
            overflow: hidden;
            white-space: nowrap;
            padding: 6px 0;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-content {
            display: inline-block;
            animation: scroll 25s linear infinite;
        }

        /* 這是唯一新增的細節：讓結果顯示在頁面上而不是彈窗 */
        #search-result {
            display: none; 
            margin-top: 2rem;
            padding: 1.5rem;
            border-left: 2px solid #d9d4cc;
            background: rgba(255,255,255,0.05);
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-content">
            [ 系統公告 ]：當前全域節點同步率 98.2% ··· [ 配送異常 ]：牧野分撥中心滯留中 ··· [ 認領提醒 ]：請遺落物件之主盡快前往「心意認領」 ··· [ 系統公告 ]：萬物歸心，終有一宿 ···
        </div>
    </div>

    <nav class="px-6 py-6 md:px-16 md:py-8 flex justify-between items-center bg-white/60 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="flex items-center space-x-3 md:space-x-4">
            <img src="https://files.oaiusercontent.com/file-m0z0m0z0m0z0m0z0m0z0m0z0" alt="Logo" class="company-logo transition-transform duration-700">
            <div class="flex flex-col border-l border-stone-300 pl-3 md:pl-4">
                <span class="text-lg md:text-2xl font-semibold tracking-widest-custom">歸心物流</span>
                <span class="text-[8px] md:text-[10px] uppercase opacity-40 tracking-[0.4em] md:tracking-[0.4em]">Guixin Express</span>
            </div>
        </div>
        
        <div class="hidden md:flex space-x-12 text-sm tracking-widest font-medium text-stone-600">
            <a href="#" class="hover:text-stone-900 transition-colors">服務項目</a>
            <a href="#" class="hover:text-stone-900 transition-colors">配送據點</a>
            <a href="#" id="collect-link" class="hover:text-stone-900 transition-colors">心意認領</a>
            <a href="#" class="border border-stone-800 px-6 py-1 hover:bg-stone-800 hover:text-white transition-all">加盟登入</a>
        </div>

        <div class="md:hidden text-xs border border-stone-400 px-3 py-1 opacity-60">選單</div>
    </nav>

    <header class="hero-banner py-24 md:py-40 px-6 md:px-12 text-center">
        <h2 class="text-2xl md:text-4xl font-light mb-6 md:mb-8 tracking-widest-custom leading-relaxed">萬物歸心，終有一宿</h2>
        <p class="text-[10px] md:text-xs opacity-50 tracking-[0.3em] md:tracking-[0.5em] mb-12 md:mb-16 uppercase px-4">—— 跨越千年的專業遞送，為您尋回遺失的託付 ——</p>
        
        <div class="max-w-2xl mx-auto">
            <div class="flex flex-col md:flex-row p-1 bg-white shadow-2xl transition-all search-container">
                <input type="text" id="trackInput" placeholder="輸入貨物檢索碼" 
                       class="flex-grow p-4 md:p-5 text-base md:text-lg bg-transparent focus:outline-none placeholder:text-stone-300 text-stone-800">
                <button onclick="handleTrack()" class="bg-[#4a443e] text-[#d9d4cc] px-8 md:px-12 py-4 md:py-5 font-semibold hover:bg-[#2d2825] transition-colors tracking-widest text-sm md:text-base">
                    檢索
                </button>
            </div>

            <div id="search-result">
                <p id="result-content" class="text-sm md:text-base leading-loose tracking-widest"></p>
            </div>
        </div>
    </header>

    <footer class="py-12 md:py-20 text-center border-t border-stone-200 bg-stone-50/50">
        <div class="max-w-3xl mx-auto px-8 md:px-12 mb-8 md:mb-10 text-[10px] md:text-[11px] opacity-40 leading-loose tracking-[0.1em] md:tracking-[0.2em]">
            <p class="mb-2">本公司受《因果律法》監管，所有遞送物件之「緣分」均受保護。</p>
            <p>若檢索過程中出現幻覺或時空錯亂，請立即停止操作。</p>
        </div>
        <p class="text-[9px] md:text-[10px] opacity-30 tracking-[0.2em] md:tracking-[0.3em]">© 2024 歸心物流有限公司 GUIXIN LOGISTICS. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
    function handleTrack() {
        // 精確抓取元素
        const inputField = document.getElementById('trackInput');
        const resultArea = document.getElementById('search-result');
        const resultContent = document.getElementById('result-content');
        
        const _raw = inputField.value.trim();
        
        if (!_raw) {
            alert("請輸入檢索碼。");
            return;
        }

        // 顯示結果區域
        resultArea.style.display = "block";

        const _keyEN = "RED-SILK";
        const _keyCH = "絳紅"; 

        if (_raw.toUpperCase() === _keyEN || _raw === _keyCH) {
            resultContent.innerText = " [ 系統檢索成功 ] \n\n 物件：『絳紅』 \n 狀態：配送異常 - 滯留中。 \n\n ※ 提示：那是靈舒最後遺留下的顏色，懸掛於千年之木。";
        } else {
            resultContent.innerText = " [ 檢索結果 ] \n\n 查無此單號。";
        }
    }

    // 支援 Enter 鍵觸發
    document.getElementById('trackInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleTrack();
        }
    });

    document.getElementById('collect-link').onclick = () => alert("這裡收集了那些暫時找不到家的小物件。");
    </script>
</body>
</html>
